<!DOCTYPE html><html><head><style>
html{background:#faf8f5}body{width:720pt;height:405pt;margin:0;padding:0;background:#faf8f5;font-family:Georgia,serif;display:flex}
.header{background:#2c3e6b;padding:20pt 40pt;position:absolute;top:0;width:100%}
.header h1{color:#fff;font-size:24pt;margin:0}
.content{padding:80pt 30pt 0 30pt;display:flex;gap:16pt;flex-wrap:wrap}
.card{flex:1;min-width:130pt;background:#fff;border-radius:10pt;padding:20pt 14pt;text-align:center;border:1px solid #e8e4df}
.card h3{color:#2c3e6b;font-size:14pt;margin:0 0 8pt 0}
.card p{color:#6b6560;font-size:11pt;line-height:1.5;margin:0}
.icon{font-size:28pt;margin-bottom:8pt}
</style></head><body>
<div class="header"><h1>系统功能一览</h1></div>
<div class="content">
<div class="card"><p class="icon">📖</p><h3>智能学习</h3><p>自动推送今日该学的单词，记住点绿色、没记住点红色</p></div>
<div class="card"><p class="icon">📊</p><h3>学习统计</h3><p>已学单词数、掌握率、今日复习数一目了然</p></div>
<div class="card"><p class="icon">🔥</p><h3>每日打卡</h3><p>有复习就自动打卡，看连续学习了多少天</p></div>
<div class="card"><p class="icon">📋</p><h3>单词列表</h3><p>200个四六级核心词，标注"未学/学习中/已掌握"</p></div>
<div class="card"><p class="icon">🎯</p><h3>测验模式</h3><p>四选一选择题，自动评分，错题一目了然</p></div>
</div>
</body></html>
