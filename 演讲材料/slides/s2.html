<!DOCTYPE html><html><head><style>
html{background:#faf8f5}body{width:720pt;height:405pt;margin:0;padding:0;background:#faf8f5;font-family:Georgia,serif;display:flex}
.header{background:#2c3e6b;padding:20pt 40pt;width:100%;position:absolute;top:0}
.header h1{color:#fff;font-size:24pt;margin:0}
.content{padding:80pt 50pt 0 50pt;display:flex;gap:30pt;align-items:flex-start}
.col{flex:1}
.col h2{color:#c8963e;font-size:18pt;margin-bottom:16pt}
.col p{color:#4a4540;font-size:14pt;line-height:1.7;margin:0}
.bad{color:#c47a7a!important;font-weight:bold}
</style></head><body>
<div class="header"><h1>为什么要做这个系统？</h1></div>
<div class="content">
<div class="col"><h2>背单词的痛</h2>
<p>背了忘、忘了背，循环反复<br>没有复习计划，全靠感觉<br>背词软件要么收费、要么太复杂<br>不知道自己真正掌握了多少<br>缺少成就感，难以坚持</p></div>
<div class="col"><h2>科学的答案</h2>
<p>心理学家赫尔曼·艾宾浩斯发现：<br>人的记忆会随时间衰减<br>但在"即将遗忘的临界点"复习<br>记忆效果提升数倍<br>这就是"间隔重复"理论<br>我们需要一个系统来执行它</p></div>
</div>
</body></html>
