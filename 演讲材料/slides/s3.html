<!DOCTYPE html><html><head><style>
html{background:#faf8f5}body{width:720pt;height:405pt;margin:0;padding:0;background:#faf8f5;font-family:Georgia,serif;display:flex}
.header{background:#2c3e6b;padding:20pt 40pt;position:absolute;top:0;width:100%}
.header h1{color:#fff;font-size:24pt;margin:0}
.content{padding:80pt 40pt 0 40pt;display:flex;gap:30pt}
.left{flex:1;display:flex;flex-direction:column;justify-content:center}
.left h2{color:#c8963e;font-size:16pt;margin-bottom:12pt}
.left p{color:#4a4540;font-size:13pt;line-height:1.7;margin:0}
.right{flex:1.2;background:#fff;border-radius:12pt;padding:24pt;border:1px solid #e8e4df}
.right h3{color:#2c3e6b;font-size:15pt;margin:0 0 14pt 0;text-align:center}
.step{display:flex;align-items:center;gap:12pt;margin-bottom:14pt}
.num{width:32pt;height:32pt;border-radius:50%;background:#f2efe9;color:#c8963e;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14pt;flex-shrink:0}
.txt{font-size:13pt;color:#4a4540}
</style></head><body>
<div class="header"><h1>艾宾浩斯遗忘曲线 — 通俗理解</h1></div>
<div class="content">
<div class="left">
<h2>核心原理</h2>
<p>学完新单词后，一天内忘掉70%。但如果在关键时间点复习，就能"打断"遗忘过程，每次复习后遗忘速度越来越慢。</p>
<p style="margin-top:14pt">我们的系统自动计算最佳复习时间：</p>
</div>
<div class="right">
<h3>复习时间线</h3>
<div class="step"><div class="num"><p>5m</p></div><p class="txt">学完后5分钟 — 第一次巩固</p></div>
<div class="step"><div class="num"><p>30m</p></div><p class="txt">半小时后 — 第二次巩固</p></div>
<div class="step"><div class="num"><p>12h</p></div><p class="txt">半天后 — 进入短期记忆</p></div>
<div class="step"><div class="num"><p>1d</p></div><p class="txt">1天后→2天→4天→7天→15天→30天</p></div>
</div>
</div>
</body></html>
