<!DOCTYPE html><html><head><style>
html{background:#faf8f5}body{width:720pt;height:405pt;margin:0;padding:0;background:#faf8f5;font-family:Georgia,serif;display:flex}
.header{background:#2c3e6b;padding:20pt 40pt;position:absolute;top:0;width:100%}
.header h1{color:#fff;font-size:24pt;margin:0}
.content{padding:80pt 40pt 0 40pt;display:flex;gap:30pt}
.col{flex:1;background:#fff;border-radius:10pt;padding:22pt;border:1px solid #e8e4df}
.col h3{color:#c8963e;font-size:14pt;margin:0 0 12pt 0}
.col p{color:#6b6560;font-size:12pt;line-height:1.6;margin:0}
.bold{color:#2c3e6b;font-weight:bold}
</style></head><body>
<div class="header"><h1>技术架构 — 简单版</h1></div>
<div class="content">
<div class="col">
<h3>用户看到的</h3>
<p>只需一个浏览器<br>打开网址就能用<br>注册 → 登录 → 背单词<br>像用微信一样简单<br>手机电脑都能访问</p>
</div>
<div class="col">
<h3>背后在运行的</h3>
<p>前端：Vue.js（网页界面）<br>后端：Node.js（数据处理）<br>数据库：MongoDB Atlas（云端存储）<br>部署：Railway（免费云服务器）<br>保活：UptimeRobot（防止休眠）</p>
</div>
<div class="col">
<h3>数据安全保障</h3>
<p>密码加密存储（bcrypt）<br>登录使用 JWT 令牌<br>每个人的学习记录相互隔离<br>数据存在云端，不丢失<br>完全免费，无需安装</p>
</div>
</div>
</body></html>
