<!DOCTYPE html><html><head><style>
html{background:#faf8f5}body{width:720pt;height:405pt;margin:0;padding:0;background:#faf8f5;font-family:Georgia,serif;display:flex}
.header{background:#2c3e6b;padding:20pt 40pt;position:absolute;top:0;width:100%}
.header h1{color:#fff;font-size:24pt;margin:0}
.content{padding:68pt 40pt 0 40pt}
.phase{display:flex;align-items:flex-start;gap:8pt;margin-bottom:3pt;background:#fff;border-radius:5pt;padding:7pt 14pt;border-left:3pt solid #c8963e}
.num{color:#c8963e;font-weight:bold;font-size:12pt;min-width:45pt}
.num p{margin:0}
.desc h3{color:#2c3e6b;font-size:12pt;margin:0 0 1pt 0}
.desc p{color:#6b6560;font-size:10pt;margin:0;line-height:1.3}
</style></head><body>
<div class="header"><h1>开发历程 — 六个阶段</h1></div>
<div class="content">
<div class="phase"><p class="num">阶段1</p><div class="desc"><h3>JSON 后端</h3><p>Express 框架 + JWT 登录 + 遗忘曲线算法</p></div></div>
<div class="phase"><p class="num">阶段2</p><div class="desc"><h3>Vue 前端</h3><p>三个核心页面：登录 / 首页 / 学习卡片</p></div></div>
<div class="phase"><p class="num">阶段3</p><div class="desc"><h3>部署上线</h3><p>Railway 云端 + Docker 构建，公网可访问</p></div></div>
<div class="phase"><p class="num">阶段4</p><div class="desc"><h3>MongoDB</h3><p>数据上云永久保存，再也不怕丢失</p></div></div>
<div class="phase"><p class="num">阶段5</p><div class="desc"><h3>新功能</h3><p>统计 + 列表 + 打卡 + 测验 + 200词库</p></div></div>
<div class="phase"><p class="num">阶段6</p><div class="desc"><h3>优化</h3><p>暖调学院风设计 + 7x24 保活</p></div></div>
</div>
</body></html>
